75、LVM 的组成部分都有哪些？这些组成部分的具体工作是什么？

一个可供存储 LVM 的块设备.如硬盘分区（MBR 或 GPT 分区）、
SAN的硬盘、RAID或LUN，一个回环文件,一个被内核映射的设备(例
如dm-crypt)，它包含一个特殊的 LVM 头，它是LVM构建的实际硬件
或存储系统。
2卷组(VG，VolumeGroup)
卷组是对一个或多个物理卷的集合，并在设备文件系统中显示为
/dev/VG_NAME。

3逻辑卷(LV，LogicalVolume)
逻辑卷是可供系统使用的最终元设备，它们在卷组中创建和管理，由
物理块组成，实际上就是一个虚拟分区，并显示为
/dev/VG_NAME/LV_NAME，通常在其上可以创建文件系统。
4物理块(PE，PhysicalExtends)
一个卷组中最小的连续区域(默认为 4MB)，多个物理块将被分配给一
个逻辑卷。你可以把它看成物理卷的一部分，这部分可以被分配给一
个逻辑卷。

76、简述虚拟网桥的工作原理。
答案: MAC 地址学习
虚拟网桥通过学习虚拟机或虚拟网络接口的 MAC 地址来构建转发
表。当虚拟网桥接收到一个数据帧时，它会检查该帧的源 MAC 地
址，并将其与接收该帧的端口（在虚拟环境中是虚拟端口）关联起
来，记录在转发表中。例如，虚拟网桥接收到一个从虚拟机 A 发来的
数据帧，帧的源 MAC 地址是虚拟机 A 的 MAC 地址。虚拟网桥会记
录下虚拟机 A 的 MAC 地址与对应的虚拟端口之间的映射关系。
帧转发
当虚拟网桥接收到一个数据帧时，它会根据转发表中的记录来决定如
何处理该帧。如果转发表中存在该帧的目的 MAC 地址对应的端口信
息，虚拟网桥会将该帧转发到对应的端口。如果转发表中没有该帧的
目的 MAC 地址，虚拟网桥会将该帧广播到所有端口（除了接收该帧
的端口），以便让其他设备能够接收到该帧并响应。例如，虚拟机 B
要向虚拟机 C 发送数据帧。虚拟网桥根据转发表发现虚拟机 C 的

MAC 地址对应的端口，于是将数据帧转发到该端口，从而实现虚拟机
B 和虚拟机 C 之间的通信。
环路避免
在虚拟网络环境中，可能会存在多个虚拟网桥连接在一起，形成环
路。为了避免环路导致的广播风暴等问题，虚拟网桥通常会采用生成
树协议（STP）或其变种。生成树协议通过计算生成树，将网络中的环
路逻辑上断开，从而确保数据帧在网络中只能沿着唯一的路径传输。
虚拟网桥会根据生成树协议的算法，选择一些端口作为阻塞端口，阻
止数据帧通过这些端口，从而避免环路。

    // 题库解析器
    function parseQuizData(rawText) {
        const questions = [];
        // 按题目序号分割
        const blocks = rawText.split(/\n(?=\d+、)/).filter(b => b.trim());
        
        blocks.forEach(block => {
            const lines = block.split('\n').map(l => l.trim()).filter(l => l);
            let qText = "", ansText = "", expText = "";
            let options = [];
            let qType = "short"; // 默认简答题
            let currentSect = "q";
            
            lines.forEach(line => {
                if (/^[A-D]、/.test(line)) {
                    options.push(line);
                    qType = "mcq";
                    currentSect = "opt";
                } else if (/^答案[:：]/.test(line)) {
                    ansText = line.replace(/^答案[:：]\s*/, "").trim();
                    currentSect = "ans";
                } else if (/^解析[:：]/.test(line)) {
                    expText = line.replace(/^解析[:：]\s*/, "").trim();
                    currentSect = "exp";
                } else {
                    if (currentSect === "q") qText += (qText ? "\n" : "") + line;
                    else if (currentSect === "ans") ansText += (ansText ? "\n" : "") + line;
                    else if (currentSect === "exp") expText += (expText ? "\n" : "") + line;
                }
            });

            // 判断题检测（如果没有选项但答案是正确/错误）
            if (options.length === 0 && (ansText === "正确" || ansText === "错误")) {
                qType = "tf";
                options = ["正确", "错误"];
            }

            // 获取正确索引 (针对单选和判断)
            let correctIndex = -1;
            if (qType === "mcq") {
                const match = ansText.match(/[A-D]/);
                if (match) correctIndex = match[0].charCodeAt(0) - 65;
            } else if (qType === "tf") {
                correctIndex = ansText === "正确" ? 0 : 1;
            }

            questions.push({
                question: qText,
                type: qType,
                options: options,
                answer: ansText,
                explanation: expText,
                correctIndex: correctIndex
            });
        });
        return questions;
    }

    // 初始化题库
    const quizData = parseQuizData(rawData);
    
    // 应用状态
    let currentIndex = 0;
    let isMemorizeMode = false;
    let userAnswers = new Array(quizData.length).fill(null);
    let currentCategory = 'all';
    let filteredIndexes = [];
    let currentFiltered = 0;

    function updateFilteredIndexes() {
        filteredIndexes = quizData
            .map((_, idx) => idx)
            .filter(idx => currentCategory === 'all' || quizData[idx].type === currentCategory);
        if (filteredIndexes.length === 0) {
            filteredIndexes = quizData.map((_, idx) => idx);
            currentCategory = 'all';
        }
        if (currentFiltered >= filteredIndexes.length) {
            currentFiltered = filteredIndexes.length - 1;
        }
    }

    function changeCategory(event) {
        currentCategory = event.target.value;
        currentFiltered = 0;
        updateFilteredIndexes();
        renderQuestion();
    }

    // DOM 元素
    const elements = {
        progress: document.getElementById('progress'),
        qTypeLabel: document.getElementById('qTypeLabel'),
        question: document.getElementById('questionText'),
        options: document.getElementById('optionsContainer'),
        saContainer: document.getElementById('saContainer'),
        explanation: document.getElementById('explanationText'),
        prevBtn: document.getElementById('prevBtn'),
        nextBtn: document.getElementById('nextBtn'),
        modeBtn: document.getElementById('modeBtn'),
        app: document.getElementById('app'),
        jumpInput: document.getElementById('jumpInput')
    };

    function renderQuestion() {
        const actualIndex = filteredIndexes[currentFiltered];
        const currentData = quizData[actualIndex];
        
        // 渲染基础信息
        elements.progress.innerText = `${currentFiltered + 1} / ${filteredIndexes.length}` + (currentCategory === 'all' ? '' : ` (共 ${filteredIndexes.length} 题)`);
        elements.question.innerText = currentData.question;
        elements.jumpInput.value = currentFiltered + 1;
        
        // 类型标签设置
        const typeLabels = { mcq: "单选题", tf: "判断题", short: "填空/简答题" };
        elements.qTypeLabel.innerText = typeLabels[currentData.type] || "未知题型";
        
        // 重置视图
        elements.options.innerHTML = '';
        elements.options.style.display = 'none';
        elements.saContainer.style.display = 'none';
        elements.explanation.style.display = 'none';
        
        const showExpHTML = `<span class="ans-label">正确答案: ${currentData.answer}</span>` + 
                            (currentData.explanation ? `解析: ${currentData.explanation}` : '');

        if (currentData.type === 'mcq' || currentData.type === 'tf') {
            elements.options.style.display = 'flex';
            currentData.options.forEach((opt, index) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => handleOptionClick(index);
                
                if (isMemorizeMode) {
                    if (index === currentData.correctIndex) div.classList.add('correct');
                } else {
                    if (userAnswers[actualIndex] !== null) {
                        if (index === currentData.correctIndex) div.classList.add('correct');
                        else if (index === userAnswers[actualIndex]) div.classList.add('wrong');
                    }
                }
                elements.options.appendChild(div);
            });
            
            if (isMemorizeMode || userAnswers[actualIndex] !== null) {
                elements.explanation.innerHTML = showExpHTML;
                elements.explanation.style.display = 'block';
            }
            
        } else {
            // 简答题逻辑
            if (isMemorizeMode || userAnswers[actualIndex] === 'viewed') {
                elements.explanation.innerHTML = showExpHTML;
                elements.explanation.style.display = 'block';
            } else {
                elements.saContainer.style.display = 'block';
            }
        }

        // 按钮状态
        elements.prevBtn.disabled = currentFiltered === 0;
        elements.nextBtn.disabled = currentFiltered === filteredIndexes.length - 1;
    }

    function handleOptionClick(selectedIndex) {
        if (isMemorizeMode) return;
        const actualIndex = filteredIndexes[currentFiltered];
        if (userAnswers[actualIndex] !== null) return;
        userAnswers[actualIndex] = selectedIndex;
        renderQuestion();
    }
    
    function showSAAnswer() {
        if (isMemorizeMode) return;
        const actualIndex = filteredIndexes[currentFiltered];
        userAnswers[actualIndex] = 'viewed'; // 标记已查看
        renderQuestion();
    }

    function toggleMode() {
        isMemorizeMode = !isMemorizeMode;
        elements.modeBtn.innerText = isMemorizeMode ? "当前: 背题模式" : "当前: 刷题模式";
        elements.app.classList.toggle('memorize-mode', isMemorizeMode);
        renderQuestion();
    }

    function prevQuestion() { if (currentFiltered > 0) { currentFiltered--; renderQuestion(); } }
    function nextQuestion() { if (currentFiltered < filteredIndexes.length - 1) { currentFiltered++; renderQuestion(); } }
    function jumpTo() {
        let val = parseInt(elements.jumpInput.value);
        if(!isNaN(val) && val >= 1 && val <= filteredIndexes.length) {
            currentFiltered = val - 1;
            renderQuestion();
        } else {
            alert(`请输入 1 到 ${filteredIndexes.length} 之间的题号`);
        }
    }

    // 初始化过滤并渲染
    updateFilteredIndexes();
    renderQuestion();
</script>
